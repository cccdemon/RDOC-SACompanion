name: Build SquadLink Lite (Windows)

# Builds the RDOC SquadLink Lite desktop prototype (Tauri GUI) on a clean Windows
# runner — so it can be built/installed without a local Rust/Tauri toolchain.
#
# - push to main / manual run  → builds + uploads the installer as a workflow artifact
# - push a tag `squadlink-lite-v*`  → also creates a draft GitHub Release with the installers
#
# The prototype is UNSIGNED → Windows SmartScreen will warn on first run.

on:
  push:
    branches: [main]
    tags: ["squadlink-lite-v*"]
    paths:
      - "apps/companion/**"
      - "apps/companion-core/**"
      - "crates/**"
      - ".github/workflows/build-companion.yml"
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write # tauri-action needs this to create the Release on a tag
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: apps/companion/pnpm-lock.yaml

      - name: Setup Rust (stable, MSVC)
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/companion/src-tauri -> target

      - name: Install frontend deps
        working-directory: apps/companion
        # not --frozen: manifests get edited during prototyping
        run: pnpm install --no-frozen-lockfile

      - name: Generate app icons from the SquadLink Lite logo
        working-directory: apps/companion
        run: pnpm tauri icon src/Squad_Link_Lite.png

      - name: Build Tauri app (+ release on tag)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: apps/companion
          # tagName non-empty only on a tag push → tauri-action then cuts a release.
          tagName: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || '' }}
          releaseName: RDOC SquadLink Lite ${{ github.ref_name }}
          # Published (not draft) so the server can auto-pull the asset; marked
          # prerelease because the build is unsigned.
          releaseDraft: false
          prerelease: true
          releaseBody: |
            RDOC SquadLink Lite prototype build (Windows).
            Unsigned — Windows SmartScreen will warn; "More info → Run anyway".

      - name: Upload installer artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: rdoc-squadlink-lite-windows
          if-no-files-found: warn
          path: |
            apps/companion/src-tauri/target/release/bundle/nsis/*.exe
            apps/companion/src-tauri/target/release/bundle/msi/*.msi

  # On a tag release, immediately tell the server to pull the new installer
  # (push trigger, instead of waiting for the hourly systemd timer). The SSH
  # key is locked to a forced command on the host: it can ONLY run
  # `systemctl start squadlink-installer.service` — no shell, no other access.
  notify-pull:
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - name: Trigger server installer pull
        run: |
          install -m 700 -d ~/.ssh
          printf '%s\n' "${{ secrets.DEPLOY_PULL_KEY }}" > ~/.ssh/id_pull
          chmod 600 ~/.ssh/id_pull
          ssh -i ~/.ssh/id_pull -o StrictHostKeyChecking=accept-new -o BatchMode=yes \
            root@ve.raumdock.org true
