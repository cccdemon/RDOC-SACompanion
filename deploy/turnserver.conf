# coturn config for RDOC-SACompanion. Ephemeral REST auth (use-auth-secret):
# InitConnection mints username "<expiry>:<userId>" + HMAC-SHA1 credential.
#
# IMPORTANT: static-auth-secret MUST equal the init container's TURN_SECRET.

realm=rdoc-sacompanion
use-auth-secret
static-auth-secret=REPLACE_WITH_TURN_SECRET

listening-port=3478
tls-listening-port=5349

# turns:// (TLS) — reuse the init self-signed cert (clients pin via app, but
# TURN TLS only needs a working chain to the client's pin trust).
cert=/certs/init-cert.pem
pkey=/certs/init-key.pem

# Relay port range — must be open in the host firewall (UDP).
# NOTE: on a Proxmox host, 49152-49215 is used by PVE live migration —
# keep the TURN range clear of it.
min-port=50000
max-port=60000

# coturn must advertise the host's PUBLIC IP for relay candidates. Set this
# (auto-detect is unreliable, esp. behind NAT):
# external-ip=YOUR.PUBLIC.IP.HERE

fingerprint
no-cli
no-tlsv1
no-tlsv1_1
# Lock down: only relay, no extra services.
no-multicast-peers
